<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Phishing Detector Pro</title>
  <link rel="icon" href="clickbait.png">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

    :root {
      --bg: #0a0e1a;
      --card-bg: rgba(15, 20, 35, 0.85);
      --card-border: rgba(139, 92, 246, 0.15);
      --purple-500: #8b5cf6;
      --purple-400: #a78bfa;
      --purple-600: #7c3aed;
      --purple-700: #6d28d9;
      --indigo-500: #6366f1;
      --indigo-600: #4f46e5;
      --green: #22c55e;
      --green-bg: rgba(34, 197, 94, 0.1);
      --green-border: rgba(34, 197, 94, 0.3);
      --yellow: #eab308;
      --yellow-bg: rgba(234, 179, 8, 0.1);
      --yellow-border: rgba(234, 179, 8, 0.3);
      --red: #ef4444;
      --red-bg: rgba(239, 68, 68, 0.1);
      --red-border: rgba(239, 68, 68, 0.3);
      --slate-100: #f1f5f9;
      --slate-300: #cbd5e1;
      --slate-400: #94a3b8;
      --slate-500: #64748b;
      --slate-600: #475569;
      --slate-800: rgba(30, 41, 59, 0.6);
      --slate-900: rgba(15, 23, 42, 0.6);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html {
      background: #05070f;
    }

    body {
      width: 380px;
      min-height: 516px;
      max-height: 616px;
      background: #05070f;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      color: var(--slate-100);
      padding: 8px;
      overflow: hidden;
    }

    .popup-card {
      width: 100%;
      height: 100%;
      min-height: 500px;
      max-height: 600px;
      background: var(--bg);
      border: 1px solid rgba(139, 92, 246, 0.25);
      border-radius: 16px; /* Curved edges for the extension shape */
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      position: relative;
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.6);
    }

    .popup-card::-webkit-scrollbar { width: 4px; }
    .popup-card::-webkit-scrollbar-track { background: transparent; }
    .popup-card::-webkit-scrollbar-thumb { background: var(--purple-700); border-radius: 4px; }

    /* ── Ambient glow ────────────────────────────── */
    .glow {
      position: absolute;
      top: -60px;
      left: 50%;
      transform: translateX(-50%);
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(139,92,246,0.15) 0%, transparent 70%);
      filter: blur(40px);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Header ──────────────────────────────────── */
    .header {
      position: relative;
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 18px 20px 14px;
      border-bottom: 1px solid rgba(139,92,246,0.1);
    }

    .header-icon {
      width: 38px;
      height: 38px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 12px;
      background: linear-gradient(135deg, rgba(139,92,246,0.2), rgba(99,102,241,0.2));
      border: 1px solid rgba(139,92,246,0.3);
      flex-shrink: 0;
    }

    .header-icon svg {
      width: 20px;
      height: 20px;
      color: var(--purple-400);
    }

    .header-title {
      font-size: 15px;
      font-weight: 800;
      letter-spacing: 0.5px;
      background: linear-gradient(135deg, var(--purple-400), var(--indigo-500));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .header-sub {
      font-size: 10px;
      color: var(--slate-500);
      margin-top: 1px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--green);
      margin-left: auto;
      box-shadow: 0 0 8px rgba(34,197,94,0.5);
      animation: pulse-dot 2s infinite;
      flex-shrink: 0;
    }

    .status-dot.offline {
      background: var(--red);
      box-shadow: 0 0 8px rgba(239,68,68,0.5);
      animation: none;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* ── Scanner Section ─────────────────────────── */
    .section {
      position: relative;
      z-index: 10;
      padding: 16px 20px;
    }

    .scan-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      padding: 18px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .scan-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--slate-400);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 10px;
    }

    .input-wrapper {
      display: flex;
      gap: 8px;
      margin-bottom: 0;
    }

    .url-input {
      flex: 1;
      padding: 10px 12px;
      background: rgba(10, 14, 26, 0.8);
      border: 1px solid rgba(139,92,246,0.15);
      border-radius: 10px;
      color: var(--slate-100);
      font-family: 'Inter', monospace;
      font-size: 12px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .url-input::placeholder { color: var(--slate-600); }
    .url-input:focus {
      border-color: var(--purple-500);
      box-shadow: 0 0 0 3px rgba(139,92,246,0.1);
    }

    .scan-btn {
      padding: 10px 16px;
      background: linear-gradient(135deg, var(--purple-600), var(--indigo-600));
      border: none;
      border-radius: 10px;
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }

    .scan-btn:hover {
      background: linear-gradient(135deg, var(--purple-500), var(--indigo-500));
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(139,92,246,0.3);
    }

    .scan-btn:active { transform: scale(0.97); }
    .scan-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .scan-btn svg { width: 14px; height: 14px; }

    /* ── Loading ──────────────────────────────────── */
    .spinner {
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Result Card ─────────────────────────────── */
    .result-card {
      margin-top: 14px;
      border-radius: 14px;
      padding: 16px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      animation: slideIn 0.3s ease-out;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .result-card.safe {
      background: var(--green-bg);
      border: 1px solid var(--green-border);
    }
    .result-card.suspicious {
      background: var(--yellow-bg);
      border: 1px solid var(--yellow-border);
    }
    .result-card.phishing {
      background: var(--red-bg);
      border: 1px solid var(--red-border);
    }

    .result-verdict {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }

    .verdict-icon {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .safe .verdict-icon { background: rgba(34,197,94,0.2); }
    .suspicious .verdict-icon { background: rgba(234,179,8,0.2); }
    .phishing .verdict-icon { background: rgba(239,68,68,0.2); }

    .verdict-text {
      font-size: 18px;
      font-weight: 800;
      letter-spacing: 0.5px;
    }

    .safe .verdict-text { color: var(--green); }
    .suspicious .verdict-text { color: var(--yellow); }
    .phishing .verdict-text { color: var(--red); }

    .result-score {
      font-size: 11px;
      color: var(--slate-400);
      margin-left: auto;
      font-weight: 600;
      font-family: monospace;
    }

    /* ── Score Bar ────────────────────────────────── */
    .score-bar-container {
      margin-bottom: 14px;
    }

    .score-bar-bg {
      height: 6px;
      background: rgba(255,255,255,0.06);
      border-radius: 3px;
      overflow: hidden;
    }

    .score-bar-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.6s ease-out;
    }

    .safe .score-bar-fill { background: linear-gradient(90deg, var(--green), #4ade80); }
    .suspicious .score-bar-fill { background: linear-gradient(90deg, var(--yellow), #facc15); }
    .phishing .score-bar-fill { background: linear-gradient(90deg, var(--red), #f87171); }

    /* ── Vendor Votes ────────────────────────────── */
    .votes-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }

    .vote-item {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 8px;
      background: rgba(0,0,0,0.2);
      border-radius: 8px;
      font-size: 10px;
      color: var(--slate-300);
    }

    .vote-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .vote-dot.legit { background: var(--green); }
    .vote-dot.phishing { background: var(--red); }
    .vote-dot.suspicious { background: var(--yellow); }
    .vote-dot.uncertain { background: var(--slate-500); }

    /* ── Reasons ──────────────────────────────────── */
    .reasons-section {
      margin-top: 12px;
    }

    .reasons-title {
      font-size: 10px;
      font-weight: 700;
      color: var(--slate-500);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 6px;
    }

    .reason-item {
      font-size: 11px;
      color: var(--slate-300);
      padding: 4px 0;
      border-bottom: 1px solid rgba(255,255,255,0.03);
      display: flex;
      align-items: flex-start;
      gap: 6px;
    }

    .reason-item::before {
      content: '›';
      color: var(--purple-400);
      font-weight: 800;
      flex-shrink: 0;
    }

    /* ── Error ────────────────────────────────────── */
    .error-msg {
      margin-top: 12px;
      padding: 10px 14px;
      background: var(--red-bg);
      border: 1px solid var(--red-border);
      border-radius: 10px;
      color: var(--red);
      font-size: 11px;
      animation: slideIn 0.3s ease-out;
    }

    /* ── Footer ───────────────────────────────────── */
    .footer {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 12px 20px 16px;
      font-size: 9px;
      color: var(--slate-600);
      letter-spacing: 0.5px;
      border-top: 1px solid rgba(139,92,246,0.08);
    }

    /* ── Hidden ───────────────────────────────────── */
    .hidden { display: none !important; }

    /* ── Tabs System ──────────────────────────────── */
    .tabs-header {
      display: flex;
      border-bottom: 1px solid rgba(139, 92, 246, 0.15);
      margin-top: 14px;
      margin-bottom: 12px;
    }

    .tab-btn {
      flex: 1;
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--slate-400);
      font-size: 11px;
      font-weight: 600;
      padding: 8px 0;
      cursor: pointer;
      transition: all 0.2s ease;
      text-align: center;
    }

    .tab-btn:hover {
      color: var(--slate-100);
    }

    .tab-btn.active {
      color: var(--purple-400);
      border-bottom-color: var(--purple-500);
    }

    .tab-content {
      animation: fadeIn 0.2s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    /* ── Tab Feed List Items ──────────────────────── */
    .feed-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.03);
      border-radius: 10px;
      margin-bottom: 6px;
    }

    .feed-name-group {
      display: flex;
      flex-direction: column;
      gap: 2px;
      text-align: left;
    }

    .feed-name {
      font-size: 11px;
      font-weight: 700;
      color: var(--slate-300);
    }

    .feed-message {
      font-size: 9px;
      color: var(--slate-500);
      max-width: 220px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .feed-badge {
      font-size: 8px;
      font-weight: 700;
      text-transform: uppercase;
      padding: 2px 6px;
      border-radius: 4px;
      letter-spacing: 0.5px;
    }

    .feed-badge.legit { background: rgba(34, 197, 94, 0.15); color: var(--green); border: 1px solid rgba(34, 197, 94, 0.2); }
    .feed-badge.phishing { background: rgba(239, 68, 68, 0.15); color: var(--red); border: 1px solid rgba(239, 68, 68, 0.2); }
    .feed-badge.suspicious { background: rgba(234, 179, 8, 0.15); color: var(--yellow); border: 1px solid rgba(234, 179, 8, 0.2); }
    .feed-badge.uncertain { background: rgba(255, 255, 255, 0.05); color: var(--slate-400); border: 1px solid rgba(255, 255, 255, 0.1); }

    /* ── Tab Heuristic Details ────────────────────── */
    .heuristic-details-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      margin-bottom: 12px;
    }

    .h-detail-item {
      padding: 8px 10px;
      background: rgba(0, 0, 0, 0.25);
      border: 1px solid rgba(255, 255, 255, 0.02);
      border-radius: 10px;
      display: flex;
      flex-direction: column;
      gap: 2px;
      text-align: left;
    }

    .h-detail-title {
      font-size: 9px;
      font-weight: 600;
      color: var(--slate-500);
      text-transform: uppercase;
    }

    .h-detail-value {
      font-size: 11px;
      font-weight: 700;
      color: var(--slate-200);
      word-break: break-all;
    }

    .h-detail-value.safe { color: var(--green); }
    .h-detail-value.unsafe { color: var(--red); }
    .h-detail-value.warn { color: var(--yellow); }
  </style>
</head>
<body>
  <div class="popup-card">
    <div class="glow"></div>

    <!-- Header -->
    <div class="header">
      <div class="header-icon">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
        </svg>
      </div>
      <div>
        <div class="header-title">PHISHING DETECTOR PRO</div>
        <div class="header-sub">AI-Powered Threat Analysis</div>
      </div>
      <div class="status-dot" id="statusDot" title="Backend: Online"></div>
    </div>

    <!-- Scanner -->
    <div class="section">
      <div class="scan-card">
        <div class="scan-label">🔗 Scan a URL</div>
        <div class="input-wrapper">
          <input type="text" class="url-input" id="urlInput" placeholder="https://suspicious-site.com" />
          <button class="scan-btn" id="scanBtn">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
            </svg>
            Scan
          </button>
        </div>

        <!-- Result -->
        <div id="resultCard" class="result-card hidden">
          <div class="result-verdict">
            <div class="verdict-icon" id="verdictIcon"></div>
            <div class="verdict-text" id="verdictText"></div>
            <div class="result-score" id="scoreText"></div>
          </div>

          <div class="score-bar-container">
            <div class="score-bar-bg">
              <div class="score-bar-fill" id="scoreBar" style="width: 0%"></div>
            </div>
          </div>

          <!-- Tabs Header -->
          <div class="tabs-header">
            <button class="tab-btn active" id="tabBtnFeeds">Global APIs</button>
            <button class="tab-btn" id="tabBtnHeuristics">Heuristics</button>
          </div>

          <!-- Global Threat Feeds Tab -->
          <div class="tab-content" id="tabContentFeeds">
            <div class="feeds-list" id="feedsList"></div>
            <div class="votes-grid" id="votesGrid" style="margin-top: 10px;"></div>
          </div>

          <!-- Heuristics Details Tab -->
          <div class="tab-content hidden" id="tabContentHeuristics">
            <div class="heuristic-details-grid" id="heuristicDetailsGrid"></div>
            <div class="reasons-section hidden" id="reasonsSection">
              <div class="reasons-title">Detection Signals</div>
              <div id="reasonsList"></div>
            </div>
          </div>
        </div>

        <!-- Error -->
        <div id="errorMsg" class="error-msg hidden"></div>
      </div>
    </div>

    <!-- Footer -->
    <div class="footer">SECURED BY PHISHING DETECTOR PRO &mdash; v1.0</div>
  </div>

  <script src="popup.js" defer></script>
</body>
</html>
