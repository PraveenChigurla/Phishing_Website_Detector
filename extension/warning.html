<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>⚠️ Security Alert: Phishing Detected</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    :root {
      --bg: #090d16;
      --card-bg: rgba(18, 24, 38, 0.7);
      --red: #ef4444;
      --red-hover: #dc2626;
      --red-light: rgba(239, 68, 68, 0.1);
      --slate-300: #cbd5e1;
      --slate-400: #94a3b8;
      --slate-500: #64748b;
      --purple: #a855f7;
    }

    body {
      background-color: var(--bg);
      color: #f8fafc;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      margin: 0;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }

    /* Ambient Background Glow */
    .glow-container {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 0;
      overflow: hidden;
      pointer-events: none;
    }

    .glow-red {
      position: absolute;
      top: 20%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(239, 68, 68, 0.15) 0%, rgba(0,0,0,0) 70%);
      filter: blur(50px);
    }

    /* Main Container */
    .container {
      position: relative;
      z-index: 10;
      width: 90%;
      max-width: 500px;
      background: var(--card-bg);
      border: 1px solid rgba(239, 68, 68, 0.25);
      border-radius: 24px;
      padding: 40px 30px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      text-align: center;
    }

    /* Warning Badge */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--red-light);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: var(--red);
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      padding: 6px 16px;
      border-radius: 100px;
      margin-bottom: 24px;
    }

    /* Red Warning Pulsing Shield */
    .shield-icon {
      width: 80px;
      height: 80px;
      background: rgba(239, 68, 68, 0.1);
      border: 2px solid var(--red);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px auto;
      box-shadow: 0 0 20px rgba(239, 68, 68, 0.3);
      animation: pulse 2s infinite;
    }

    .shield-icon svg {
      width: 44px;
      height: 44px;
      color: var(--red);
    }

    h1 {
      font-size: 24px;
      font-weight: 800;
      margin: 0 0 10px 0;
      letter-spacing: -0.5px;
    }

    p.description {
      color: var(--slate-300);
      font-size: 14px;
      line-height: 1.6;
      margin: 0 0 24px 0;
    }

    /* Scanned URL Details block */
    .url-block {
      background: rgba(10, 15, 26, 0.8);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 30px;
      text-align: left;
    }

    .url-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      color: var(--slate-500);
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }

    .url-val {
      font-family: monospace;
      font-size: 13px;
      color: var(--slate-300);
      word-break: break-all;
    }

    /* Buttons Actions */
    .actions {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .btn {
      padding: 14px 24px;
      font-size: 14px;
      font-weight: 600;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s ease;
      border: none;
      outline: none;
    }

    .btn-block {
      background: #f8fafc;
      color: #0f172a;
      box-shadow: 0 4px 12px rgba(255, 255, 255, 0.1);
    }

    .btn-block:hover {
      background: #e2e8f0;
      transform: translateY(-1px);
    }

    .btn-block:active {
      transform: translateY(0);
    }

    .btn-proceed {
      background: transparent;
      color: var(--slate-400);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .btn-proceed:hover {
      background: rgba(255, 255, 255, 0.03);
      color: var(--slate-300);
      border-color: rgba(255, 255, 255, 0.2);
    }

    @keyframes pulse {
      0% {
        box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4);
      }
      70% {
        box-shadow: 0 0 0 15px rgba(239, 68, 68, 0);
      }
      100% {
        box-shadow: 0 0 0 0 rgba(239, 68, 68, 0);
      }
    }
  </style>
</head>
<body>

  <div class="glow-container">
    <div class="glow-red"></div>
  </div>

  <div class="container">
    <div class="badge">
      <svg width="12" height="12" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
        <path fill-rule="evenodd" d="M8.257 3.099c.765-1.36 2.722-1.36 3.486 0l5.58 9.92c.75 1.334-.213 2.98-1.742 2.98H4.42c-1.53 0-2.493-1.646-1.743-2.98l5.58-9.92zM11 13a1 1 0 11-2 0 1 1 0 012 0zm-1-8a1 1 0 00-1 1v3a1 1 0 002 0V6a1 1 0 00-1-1z" clip-rule="evenodd"></path>
      </svg>
      Critical Alert
    </div>

    <div class="shield-icon">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path stroke-linecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
      </svg>
    </div>

    <h1>Deceptive Site Blocked</h1>
    <p class="description">
      Our security gateway has flagged the website you are trying to access as a potential phishing or scam layout designed to steal credential metadata.
    </p>

    <div class="url-block">
      <div class="url-label">Requested URL</div>
      <div class="url-val" id="target-url">Loading URL...</div>
    </div>

    <div class="actions">
      <button class="btn btn-block" id="go-back-btn">Go Back to Safety</button>
      <button class="btn btn-proceed" id="proceed-btn">Proceed Anyway (Unsafe)</button>
    </div>
  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const targetUrl = urlParams.get('url') || 'Unknown';
    document.getElementById('target-url').textContent = targetUrl;

    document.getElementById('go-back-btn').addEventListener('click', () => {
      // Go back in navigation history
      window.history.go(-2); 
    });

    document.getElementById('proceed-btn').addEventListener('click', () => {
      // Bypass extension interception (navigate directly)
      window.location.href = targetUrl;
    });
  </script>
</body>
</html>
